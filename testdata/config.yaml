proxy:
  router:
    upstreams:
      multi-1: http://test.host.multi:9000
      multi-2: http://test.host.multi:9001
      single: http://test.host.single:8080

    default: single
    routes:
      - host: multiple.path.ex
        default: single
        pathes:
          - path: /v1
            upstream: multi-1

          - path: /v2
            upstream: multi-2
            
      - host: single.path.ex
        pathes:
          - path: /asd
            upstream: single

  limiter:
    type: token_bucket
    algorithm:
      capacity: 100
      rate: 100.5
      
edge_limiter:
  is_global: true
  type: fixed_window
  algorithm:
    limit: 4
    window_duration: 1s
  storage: 
    ttl: 1s

metrics:
  hosts:
    - localhost
    
